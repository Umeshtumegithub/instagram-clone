<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #fafafa; display: flex; flex-direction: column; align-items: center; padding-top: 70px; }
        .navbar { position: fixed; top: 0; width: 100%; height: 54px; background: white; border-bottom: 1px solid #dbdbdb; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .nav-container { width: 100%; max-width: 600px; display: flex; justify-content: space-between; padding: 0 20px; font-weight: bold; font-size: 20px; font-style: italic; }
        .feed { width: 100%; max-width: 600px; }
        .post { background: white; border: 1px solid #dbdbdb; margin-bottom: 24px; border-radius: 3px; }
        .post-header { display: flex; align-items: center; padding: 14px; font-weight: 600; font-size: 14px; }
        .avatar { width: 32px; height: 32px; background: #e0e0e0; border-radius: 50%; margin-right: 10px; }
        .post-img { width: 100%; height: auto; display: block; }
        .post-actions { padding: 10px 14px; }
        .like-btn { background: none; border: none; font-size: 24px; cursor: pointer; }
        .likes-count { font-weight: 600; padding: 0 14px; margin-bottom: 8px; font-size: 14px; }
        .caption { padding: 0 14px 14px; font-size: 14px; }
        .caption span { font-weight: 600; margin-right: 5px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <span>Instagram</span>
            <span style="font-style: normal; font-size: 16px;">🏠 ✉️</span>
        </div>
    </nav>

    <main class="feed" id="feed"></main>

    <script>
        // ⚠️ REPLACE THIS URL WITH YOUR LIVE RENDER BACKEND WEB SERVICE URL LATER
        const BACKEND_URL = "YOUR_BACKEND_RENDER_URL"; 

        async function fetchPosts() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/posts`);
                const posts = await response.json();
                const feed = document.getElementById('feed');
                feed.innerHTML = '';

                posts.forEach(post => {
                    feed.innerHTML += `
                        <div class="post">
                            <div class="post-header"><div class="avatar"></div><span>${post.username}</span></div>
                            <img class="post-img" src="${post.image}">
                            <div class="post-actions">
                                <button class="like-btn" onclick="likePost(${post.id}, this)">🤍</button>
                            </div>
                            <div class="likes-count"><span id="likes-${post.id}">${post.likes}</span> likes</div>
                            <div class="caption"><span>${post.username}</span>${post.caption}</div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Error loading posts. Make sure BACKEND_URL is set correctly.", err);
            }
        }

        async function likePost(id, button) {
            if (button.innerText === "❤️") return; // Prevent double clicking
            try {
                const response = await fetch(`${BACKEND_URL}/api/posts/${id}/like`, { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    button.innerText = "❤️";
                    document.getElementById(`likes-${id}`).innerText = data.likes;
                }
            } catch (err) {
                console.error("Failed to sync like with backend.", err);
            }
        }

        fetchPosts();
    </script>
</body>
</html>
